name: Publish to PyPI

# Publishes the package to PyPI (or TestPyPI) using Trusted Publishing (OIDC).
#
# How to trigger:
#   * PyPI release: push a tag matching v*.*.* (e.g. v0.1.0) OR run via workflow_dispatch with target=pypi
#   * TestPyPI dry run: run via workflow_dispatch with target=testpypi
#
# Prerequisites (one-time setup on PyPI / TestPyPI):
#   1. Create the project page on PyPI (or TestPyPI) — you can register the name by uploading once,
#      or configure a "pending publisher" before the first upload.
#   2. Under the project -> Publishing, add a Trusted Publisher:
#        Owner:            ArthurKeen
#        Repository name:  arango-schema-mapper
#        Workflow name:    publish.yml
#        Environment:      pypi   (or testpypi)
#   3. In this repo, create the matching GitHub Environments ("pypi" and optionally "testpypi")
#      under Settings -> Environments. No secrets required with Trusted Publishing.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: python -m twine check --strict dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      github.event_name == 'push'
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/arangodb-schema-analyzer/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/arangodb-schema-analyzer/
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
