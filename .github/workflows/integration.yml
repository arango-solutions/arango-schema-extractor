name: Integration

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start ArangoDB (docker compose)
        run: |
          docker compose up -d

      - name: Wait for ArangoDB
        run: |
          for i in {1..60}; do
            if curl -fsS -u root:openSesame "http://localhost:18529/_api/version" >/dev/null; then
              echo "ArangoDB is ready"
              exit 0
            fi
            sleep 1
          done
          echo "ArangoDB did not become ready in time"
          docker compose logs
          exit 1

      - name: Run integration tests
        env:
          RUN_INTEGRATION: "1"
          ARANGO_URL: "http://localhost:18529"
          ARANGO_DB: "schema_analyzer_it"
          ARANGO_USER: "root"
          ARANGO_PASS: "openSesame"
        run: |
          pytest -q -m integration

      - name: Stop ArangoDB
        if: always()
        run: |
          docker compose down -v

